<div class="search-bar">
  <input
    type="text"
    [(ngModel)]="searchTerm"
    (keyup)="onKeyUp()"
    (keydown.enter)="onSearch()"
    placeholder="Search products..."
  />

  <button class="search-btn" (click)="onSearch()"><i class='bx bx-search'></i></button>

  <button class="filter-icon-btn" (click)="onFilter()">
    <i class='bx bx-filter'></i>
  </button>
</div>
