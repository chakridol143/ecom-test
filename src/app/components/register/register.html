<div class="login-container">
  <div class="login-card">

    <h2>Create Account</h2>
    <p>Register to get started</p>

    <!-- NORMAL REGISTER -->
    <form (ngSubmit)="onRegister()" #f="ngForm">

      <input
        type="text"
        name="username"
        [(ngModel)]="username"
        placeholder="Full Name"
        required
      />

      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Password"
        required
      />

      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Confirm Password"
        required
      />

      <input
        type="text"
        name="phone"
        [(ngModel)]="phone"
        placeholder="Phone"
      />

      <input
        type="text"
        name="address"
        [(ngModel)]="address"
        placeholder="Address"
      />

      <button type="submit">
        Register
      </button>

    </form>

    <!-- ✅ GOOGLE OAUTH BUTTON -->
    <button
      type="button"
      id="googleBtn"
      style="margin-top:15px; width:100%;">
      <img
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        width="18"
        style="margin-right:8px;"
      />
      Continue with Google
    </button>

    <a routerLink="/login">
      Already have an account? Login
    </a>

  </div>
</div>
