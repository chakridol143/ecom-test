<header class="header-container">

  <!-- LEFT -->
  <div class="header-left">
    <div class="logo">
      <img src="../../../assets/images/JewelerLogo.png" alt="">
    </div>
  </div>

  <!-- CENTER (SEARCH) -->
  <div class="header-center">
    <app-search
      (searchEvent)="onSearch($event)"
      (filterEvent)="filterComponent.openFilter()">
    </app-search>
  </div>

  <!-- RIGHT (DESKTOP ONLY) -->
  <div class="header-right desktop-only">

    <ng-container *ngIf="!user; else loggedIn">
      <button routerLink="/login" class="login-btn">Login</button>
      <button routerLink="/register" class="login-btn">Register</button>
    </ng-container>

    <ng-template #loggedIn>
      <span class="user-name">Hello {{ user.name }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </ng-template>

  </div>

  <app-filter #filterComponent></app-filter>

  <!-- MOBILE BUTTON -->
  <button class="menu-icon mobile-only" (click)="toggleMenu()">☰</button>

</header>


<!-- MOBILE MENU -->
<div class="mobile-menu" [class.open]="menuOpen">

  <ng-container *ngIf="!user; else loggedMobile">
    <button routerLink="/login" class="menu-btn">Login</button>
    <button routerLink="/register" class="menu-btn">Register</button>
  </ng-container>

  <ng-template #loggedMobile>
    <p class="mobile-hello">Hello {{ user.name }}</p>
    <button class="menu-btn logout" (click)="logout()">Logout</button>
  </ng-template>

  <button routerLink="/admin" class="menu-btn">Admin Control Panel</button>
</div>

<!-- NAVBAR BELOW -->
<app-navbar 
  (womenCollectionClick)="showWomenCollections()"
  (productClicked)="onProductSelected($event)"
  (newReleasesClick)="showNewReleases()"
  (bestSellersClick)="showBestSellers()"
  (mensCollectionClick)="showMensCollections()">
</app-navbar>
