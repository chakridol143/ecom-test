<header class="header-container">

  <div class="header-left">
    <div class="logo">
      <img src="../../../assets/images/JewelerLogo.png" alt="">
    </div>
  </div>

  <!-- SEARCH BAR ONLY FOR USERS -->
  <div class="header-center" *ngIf="!adminLoggedIn">
    <app-search
      (searchEvent)="onSearch($event)"
      (filterEvent)="filterComponent.openFilter()">
    </app-search>
  </div>

  <div class="header-right desktop-only">

    <!-- ⭐ USER MENU -->
    <ng-container *ngIf="!adminLoggedIn">
      <ng-container *ngIf="!user; else loggedUser">
        <button routerLink="/login" class="login-btn">Login</button>
        <button routerLink="/register" class="login-btn">Register</button>
      </ng-container>

      <ng-template #loggedUser>
        <span class="user-name">Hello {{ user.name }}</span>
        <button class="logout-btn" (click)="logoutUser()">Logout</button>
      </ng-template>
    </ng-container>

    <!-- ⭐ ADMIN MENU -->
    <ng-container *ngIf="adminLoggedIn">
      <span class="user-name admin">Admin Panel</span>
      <button class="logout-btn" (click)="logoutAdmin()">Logout</button>
    </ng-container>

  </div>

  <!-- FILTER ONLY FOR USERS -->
  <app-filter #filterComponent *ngIf="!adminLoggedIn"></app-filter>

  <!-- MOBILE MENU ICON ONLY FOR USERS -->
  <button class="menu-icon mobile-only" (click)="toggleMenu()" *ngIf="!adminLoggedIn">
    ☰
  </button>

</header>

<!-- MOBILE MENU ONLY FOR USERS -->
<div class="mobile-menu" [class.open]="menuOpen" *ngIf="!adminLoggedIn">

  <ng-container *ngIf="!user; else loggedMobile">
    <button routerLink="/login" class="menu-btn">Login</button>
    <button routerLink="/register" class="menu-btn">Register</button>
  </ng-container>

  <ng-template #loggedMobile>
    <p class="mobile-hello">Hello {{ user.name }}</p>
    <button class="menu-btn logout" (click)="logoutUser()">Logout</button>
  </ng-template>

  <!-- SHOW ADMIN PANEL BUTTON ONLY IF ADMIN NOT LOGGED -->
  <button routerLink="/admin-login" class="menu-btn" *ngIf="!adminLoggedIn">
    Admin Control Panel
  </button>

</div>
